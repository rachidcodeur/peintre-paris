# Ancien extrait « locations seules » — préférez nginx-site-example.conf (bloc server complet).
# À coller dans un server { } existant si vous ne repartez pas de zéro.

location ~* \.(webp|jpe?g|png|gif|svg|ico|woff2?)$ {
    expires 365d;
    add_header Cache-Control "public, max-age=31536000, immutable";
    access_log off;
}

location ~* \.(css|js)$ {
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
}

location ~* \.(html|htm)$ {
    expires 1h;
    add_header Cache-Control "public, max-age=3600, must-revalidate";
}

gzip on;
gzip_types text/css application/javascript text/plain application/json;
