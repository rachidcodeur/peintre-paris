# =============================================================================
# stade-rennais.fr — Nginx (HTTPS + Certbot), aligné sur une config type Hostinger
# =============================================================================
# Déploiement : les fichiers du site (index.html, styles.css, public/) doivent être
# dans le dossier indiqué par root (ci-dessous : /var/www/stade-rennais).
# Si vos fichiers sont encore sous /var/www/peintre-paris, soit vous déplacez le site,
# soit vous remplacez root par ce chemin (un seul dossier, cohérent avec la réalité du VPS).
#
# sudo nginx -t && sudo systemctl reload nginx
# =============================================================================

# ----- HTTP → HTTPS -----
server {
    listen 80;
    listen [::]:80;
    server_name stade-rennais.fr www.stade-rennais.fr;
    return 301 https://$host$request_uri;
}

# ----- HTTPS -----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name stade-rennais.fr www.stade-rennais.fr;

    # Adaptez ce chemin : doit contenir index.html, styles.css et public/
    root /var/www/stade-rennais;
    index index.html;

    access_log /var/log/nginx/stade-rennais.access.log;
    error_log  /var/log/nginx/stade-rennais.error.log;

    ssl_certificate     /etc/letsencrypt/live/stade-rennais.fr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/stade-rennais.fr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        try_files $uri $uri/ =404;
    }

    # Cache navigateur (Lighthouse)
    location ~* \.(webp|jpe?g|png|gif|svg|ico|woff2?)$ {
        expires 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location ~* \.(html|htm)$ {
        expires 1h;
        add_header Cache-Control "public, max-age=3600, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 256;
    gzip_types text/css application/javascript text/plain application/json text/html;
}
